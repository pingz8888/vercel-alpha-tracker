<!DOCTYPE html>
<html lang="en" class="bg-black text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <link rel="manifest" href="/manifest.json">
    <title>Alpha v4 Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 safe-area-inset">
    <header class="mb-6 border-b border-gray-800 pb-4">
        <h1 class="text-2xl font-bold tracking-tight text-green-400">Alpha v4</h1>
    </header>
    
    <main id="terminal-content" class="space-y-4">
        <div class="glass-card p-4 rounded-xl">
            <h2 class="text-sm text-gray-400 uppercase tracking-wider mb-2">System Status</h2>
            <p id="status-output" class="font-mono text-sm text-green-500">Awaiting input...</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
